<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Analytics Dashboard</title>
    <style>
        /* Base Reset & Core Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0914; 
            color: #ffffff;
            overflow-x: hidden;
        }

        /* 1. 3D Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            perspective: 1200px;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .logo-3d-card {
            width: 260px;
            height: 260px;
            transform-style: preserve-3d;
            animation: flip-to-front 3.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        .logo-3d-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        @keyframes flip-to-front {
            0% { transform: rotateY(180deg); }
            12% { transform: rotateY(0deg); }
            88% { transform: rotateY(0deg); }
            100% { transform: rotateY(-180deg); }
        }

        /* 2. Page View Architecture */
        .page-view {
            display: none;
            opacity: 0;
            min-height: 100vh;
            width: 100%;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 20px 20px; 
            transition: opacity 0.4s ease;
        }
        .page-view.active {
            display: flex;
            opacity: 1;
        }

        .cards-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .aviator-section-trigger {
            margin-top: 24px; 
        }

        /* Reusable Card Layouts */
        .card {
            background: #161224;
            border: 1px solid #251f3b;
            border-radius: 16px;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-3px);
            border-color: #4c3a75;
            box-shadow: 0 15px 35px rgba(138, 43, 226, 0.15);
        }
        .card-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .brand-logo {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            object-fit: cover;
            background-color: #1f1a33;
        }
        .brand-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.5px;
        }
        
        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #a855f7; 
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .action-btn:hover {
            color: #c084fc;
        }
        .action-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Sub-Header Elements */
        .sub-header {
            width: 100%;
            max-width: 440px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .back-btn {
            background: #161224;
            border: 1px solid #251f3b;
            color: #ffffff;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .back-btn:hover {
            background: #251f3b;
        }
        .sub-title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        /* 3. Deep Signal View Dashboard Elements */
        .signal-panel {
            width: 100%;
            max-width: 440px;
            background: #130f21;
            border: 1px solid #221a3a;
            border-radius: 24px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        /* Sri Lanka Clock Typography */
        .live-timer-wrapper {
            margin-bottom: 25px;
            text-align: center;
        }
        .timer-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #a855f7;
            margin-bottom: 4px;
            font-weight: 700;
        }
        .countdown-digits {
            font-size: 2.2rem;
            font-weight: 800;
            font-family: monospace, sans-serif;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
            letter-spacing: 1px;
        }

        /* Animated Glowing Signal Circle */
        .purple-radar-container {
            position: relative;
            width: 210px;
            height: 210px;
            margin-bottom: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .purple-radar-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid #a855f7;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, rgba(0,0,0,0.8) 80%);
            box-shadow: 0 0 35px 10px rgba(168, 85, 247, 0.4), 
                        inset 0 0 25px rgba(168, 85, 247, 0.3);
            position: relative;
            overflow: hidden;
            animation: pulse-glow-purple 2.5s infinite ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        /* Dynamic Live Output Data (ලා නිල් පාටින් සකස් කරන ලදි) */
        .live-time-display {
            font-size: 1.1rem;
            color: #00f2fe; 
            z-index: 10;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.8);
        }
        .live-odd-display {
            font-size: 2.4rem;
            font-weight: 900;
            color: #00f2fe; 
            z-index: 10;
            text-shadow: 0 0 15px rgba(0, 242, 254, 1);
        }

        /* Simulated Radar Sweep Line */
        .purple-radar-circle::before {
            content: '';
            position: absolute;
            width: 50%;
            height: 50%;
            background: linear-gradient(45deg, rgba(168, 85, 247, 0.3) 0%, transparent 100%);
            transform-origin: bottom right;
            top: 0;
            left: 0;
            animation: radar-sweep 2s linear infinite;
        }

        @keyframes pulse-glow-purple {
            0%, 100% { box-shadow: 0 0 30px 5px rgba(168, 85, 247, 0.4), inset 0 0 20px rgba(168, 85, 247, 0.3); transform: scale(1); }
            50% { box-shadow: 0 0 50px 15px rgba(168, 85, 247, 0.6), inset 0 0 30px rgba(168, 85, 247, 0.5); transform: scale(1.02); }
        }
        @keyframes radar-sweep {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Live Facebook Stream Feed */
        .live-chat-panel {
            width: 100%;
            border-top: 1px solid #221a3a;
            padding-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .live-stream-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            align-self: flex-start;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .live-badge-dot {
            width: 6px;
            height: 6px;
            background-color: #ef4444;
            border-radius: 50%;
            animation: live-blink 1s infinite;
        }
        @keyframes live-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .comments-scroll-frame {
            width: 100%;
            height: 160px;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 10px;
            position: relative;
        }
        .comments-scroll-frame::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 35px;
            background: linear-gradient(to bottom, #130f21 0%, transparent 100%);
            pointer-events: none;
            z-index: 2;
        }
        .fb-comment-node {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            animation: feed-slide-up 0.35s ease-out forwards;
            background: rgba(255, 255, 255, 0.02);
            padding: 8px 12px;
            border-radius: 12px;
            border-left: 3px solid #3b5998; 
        }
        .user-avatar-placeholder {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #2a2245;
            color: #c084fc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .comment-meta-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .fb-profile-name {
            font-size: 0.82rem;
            font-weight: 700;
            color: #93c5fd;
        }
        .fb-text-string {
            font-size: 0.85rem;
            color: #e2e8f0;
            line-height: 1.35;
        }
        @keyframes feed-slide-up {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Secure PIN Verification Overlay Modal */
        #pin-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 4, 10, 0.93);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .pin-box {
            background: #161224;
            border: 2px solid #251f3b;
            border-radius: 20px;
            padding: 30px 25px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        .pin-box h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #ffffff;
        }
        .pin-box p {
            font-size: 0.85rem;
            color: #a3a3a3;
            margin-bottom: 20px;
        }
        .pin-input-field {
            width: 100%;
            padding: 12px;
            background: #0b0914;
            border: 1px solid #4c3a75;
            color: #fff;
            font-size: 1.5rem;
            letter-spacing: 8px;
            text-align: center;
            border-radius: 12px;
            outline: none;
            margin-bottom: 15px;
        }
        .pin-btn-group {
            display: flex;
            gap: 10px;
        }
        .pin-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .pin-submit { background: #a855f7; color: white; }
        .pin-cancel { background: #251f3b; color: white; }
        .pin-error-txt {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 10px;
            font-weight: 600;
            display: none;
        }
    </style>
</head>
<body>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
          apiKey: "AIzaSyCW7ULFtIh6i6WB7JZnm3JqPwZNtNS1rrw",
          authDomain: "drlive-2.firebaseapp.com",
          databaseURL: "https://drlive-2-default-rtdb.firebaseio.com",
          projectId: "drlive-2",
          storageBucket: "drlive-2.firebasestorage.app",
          messagingSenderId: "247311539245",
          appId: "1:247311539245:web:cd4389c420dd202aef2ca4",
          measurementId: "G-492MZW63EH"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getDatabase(app);

        // State object to cache server data live
        let serverCacheData = {};
        let activeSelectedPlatform = "";

        // Listen to Firebase path "sites" for realtime updates
        onValue(ref(db, "sites"), (snapshot) => {
            const data = snapshot.val();
            if(data) {
                serverCacheData = data;
                // If user is currently looking at a specific signal, refresh data live
                if(document.getElementById('signal-display-view').classList.contains('active') && activeSelectedPlatform) {
                    renderActiveSignalValues();
                }
            }
        });

        // Core App Navigation & Display Handlers
        window.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('loading-screen');
            const mainView = document.getElementById('main-menu-view');

            setTimeout(() => {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                mainView.classList.add('active');
            }, 3500); 

            setInterval(generateLiveComment, 2000);
            startSriLankaClockEngine();
        });

        function navigateTo(viewId) {
            document.querySelectorAll('.page-view').forEach(view => {
                view.classList.remove('active');
            });
            const targetView = document.getElementById(viewId);
            if(targetView) {
                targetView.classList.add('active');
            }
        }

        // Triggered when user selects 1xBet, Melbet or 888Starz
        // ලොක් එක දමා ඇති විට සයිට් එකට යාමට පෙර ආරක්ෂිතව PIN එක විමසයි
        function handlePlatformClick(brandName) {
            activeSelectedPlatform = brandName;
            const platformConfig = serverCacheData[brandName];

            if(platformConfig && platformConfig.pin_enabled === true) {
                // PIN Lock සක්‍රියයි නම් - පේජ් එක මාරු නොකර PIN බොක්ස් එක පෙන්වන්න
                document.getElementById('pin-modal-title').innerText = brandName + " Protected";
                document.getElementById('pin-digit-input').value = "";
                document.getElementById('pin-error-msg').style.display = "none";
                document.getElementById('pin-modal-overlay').style.display = "flex";
            } else {
                // Pin අක්‍රියයි (Disabled) නම් කෙලින්ම සිග්නල් පේජ් එකට යන්න
                openSignalConsole(brandName);
            }
        }

        function verifySecurePinSubmit() {
            const enteredPin = document.getElementById('pin-digit-input').value.trim();
            const actualPin = serverCacheData[activeSelectedPlatform]?.pin || "0000";

            if(enteredPin === actualPin) {
                document.getElementById('pin-modal-overlay').style.display = "none";
                openSignalConsole(activeSelectedPlatform); // පින් එක නිවැරදි නම් පමණක් ඇතුලට ගන්නවා
            } else {
                document.getElementById('pin-error-msg').style.display = "block";
            }
        }

        function closePinModal() {
            document.getElementById('pin-modal-overlay').style.display = "none";
        }

        function openSignalConsole(brandName) {
            document.getElementById('dynamic-signal-title').innerText = brandName + " Signal Server";
            renderActiveSignalValues();
            navigateTo('signal-display-view');
        }

        // රවුම මැද ටයිම් එක උඩිනුත් ඔඩ් එක යටිනුත් පෙන්වීමේ ලොජික් එක
        function renderActiveSignalValues() {
            const currentPlatform = serverCacheData[activeSelectedPlatform];
            const oddDisplay = document.getElementById('live-odd-val');
            const timeDisplay = document.getElementById('live-time-val');
            
            if(currentPlatform) {
                timeDisplay.innerText = currentPlatform.time || "00:00:00";
                oddDisplay.innerText = currentPlatform.odd || "1.00x";
            } else {
                timeDisplay.innerText = "WAITING";
                oddDisplay.innerText = "1.00x";
            }
        }

        // Expose functions globally for layout inline clicks
        window.navigateTo = navigateTo;
        window.handlePlatformClick = handlePlatformClick;
        window.verifySecurePinSubmit = verifySecurePinSubmit;
        window.closePinModal = closePinModal;

        // Sri Lanka Exact Real-Time Clock Engine Logic
        function startSriLankaClockEngine() {
            const timerDisplay = document.getElementById('live-countdown');
            
            setInterval(() => {
                const now = new Date();
                const sriLankaTimeStr = now.toLocaleTimeString('en-US', {
                    timeZone: 'Asia/Colombo',
                    hour12: false,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
                timerDisplay.innerText = sriLankaTimeStr;
            }, 1000);
        }

        // Facebook Simulated Feed Data Matrices
        const mockNames = ["Alex_Pro", "Crypto_King", "DavidM", "Sarah_Fly", "BetMaster", "Emma.99", "John_D", "LuckyLady", "Rider_X", "Sophia_V"];
        const mockComments = [
            "Wow accurate accuracy today! 🔥📈",
            "Just scored a 4.5x multiplier payout!! 🤑✈️",
            "This prediction system is completely safe 👍🚀",
            "Awesome signals! Thank you so much 👑💎",
            "Next round ready! Let's go big! 🔥🏎️",
            "Superb results today, cashout perfectly timed ❤️💯",
            "Is the next predictor online soon? Working great! ✨",
            "Amazing software platform, accurate data 🌟🤩",
            "Omg it really works flawlessly! 💥💵",
            "Big profit secured just now! 🚀🍀"
        ];

        function generateLiveComment() {
            const container = document.getElementById('fb-comments-box');
            if(!container || !document.getElementById('signal-display-view').classList.contains('active')) return;

            const randomName = mockNames[Math.floor(Math.random() * mockNames.length)];
            const randomText = mockComments[Math.floor(Math.random() * mockComments.length)];
            const avatarChar = randomName.charAt(0).toUpperCase();

            const node = document.createElement('div');
            node.className = 'fb-comment-node';
            node.innerHTML = `
                <div class="user-avatar-placeholder">${avatarChar}</div>
                <div class="comment-meta-block">
                    <span class="fb-profile-name">${randomName}</span>
                    <span class="fb-text-string">${randomText}</span>
                </div>
            `;

            container.appendChild(node);
            container.scrollTop = container.scrollHeight;

            if(container.children.length > 6) {
                container.removeChild(container.firstChild);
            }
        }
    </script>
</body>
</html>
